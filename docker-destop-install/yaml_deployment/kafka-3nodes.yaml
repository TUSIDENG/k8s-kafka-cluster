apiVersion: v1
kind: Service
metadata:
  name: kafka-headless
  labels:
    app: kafka
spec:
  clusterIP: None  # Headless Service，用于 Kafka 节点之间互相发现并通信
  ports:
  - port: 9092
    name: internal
  - port: 9094
    name: external
  - port: 9093
    name: controller
  selector:
    app: kafka
---
# ==========================================
# NodePort Service：供外部客户端访问 Kafka 集群
# 使用 NodePort 30092 端口，可以通过任意节点的 IP:30092 访问
# ==========================================
apiVersion: v1
kind: Service
metadata:
  name: kafka-nodeport
  labels:
    app: kafka
spec:
  type: NodePort  # NodePort 类型服务，允许从集群外部通过节点端口访问
  selector:
    app: kafka
  ports:
    # Kafka 外部客户端连接端口
    - port: 9094
      targetPort: 9094
      nodePort: 30092  # 外部访问端口，通过 <节点IP>:30092 连接
      name: external
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: kafka
spec:
  serviceName: "kafka-headless"
  replicas: 3  # 建立 3 个 Kafka 副本
  selector:
    matchLabels:
      app: kafka
  template:
    metadata:
      labels:
        app: kafka
    spec:
      containers:
      - name: kafka
        image: docker.m.daocloud.io/apache/kafka:3.8.0  # Apache 原生镜像，KRaft 模式
        imagePullPolicy: IfNotPresent
        command:
          - /bin/bash
          - -c
          - |
            # 1. 从Pod名称中提取节点ID（kafka-0 -> 0, kafka-1 -> 1, kafka-2 -> 2）
            export NODE_ID=$$(echo $$HOSTNAME | sed -e 's/kafka-//')
            # 2. 设置Kafka日志目录
            export LOG_DIRS=/var/lib/kafka/logs
            # 3. 创建日志目录（确保目录存在）
            mkdir -p $$LOG_DIRS
            
            # 4. 在格式化存储之前必须先修改配置文件，否则会使用默认配置
            # 设置节点ID（每个broker必须有唯一的node.id）
            sed -i "s|node.id=.*|node.id=$$NODE_ID|g" /opt/kafka/config/kraft/server.properties
            # 设置控制器投票者列表（包含所有3个节点的CONTROLLER端口）
            sed -i "s|controller.quorum.voters=.*|controller.quorum.voters=0@kafka-0.kafka-headless.default.svc.cluster.local:9093,1@kafka-1.kafka-headless.default.svc.cluster.local:9093,2@kafka-2.kafka-headless.default.svc.cluster.local:9093|g" /opt/kafka/config/kraft/server.properties
            # 设置监听器：INTERNAL(集群内部), EXTERNAL(外部客户端), CONTROLLER(控制器通信)
            sed -i "s|listeners=.*|listeners=INTERNAL://:9092,EXTERNAL://:9094,CONTROLLER://:9093|g" /opt/kafka/config/kraft/server.properties
            # 设置宣告监听器：内部使用headless service域名，外部使用localhost
            sed -i "s|advertised.listeners=.*|advertised.listeners=INTERNAL://$$HOSTNAME.kafka-headless.default.svc.cluster.local:9092,EXTERNAL://localhost:$$((9094 + NODE_ID))|g" /opt/kafka/config/kraft/server.properties
            # 设置监听器安全协议映射（全部使用PLAINTEXT）
            sed -i "s|listener.security.protocol.map=.*|listener.security.protocol.map=INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT,CONTROLLER:PLAINTEXT|g" /opt/kafka/config/kraft/server.properties
            # 设置broker间通信使用INTERNAL监听器
            sed -i "s|inter.broker.listener.name=.*|inter.broker.listener.name=INTERNAL|g" /opt/kafka/config/kraft/server.properties
            
            # 5. 如果是首次启动（meta.properties不存在），格式化存储
            if [ ! -f $$LOG_DIRS/meta.properties ]; then
              /opt/kafka/bin/kafka-storage.sh format -t 4L62ZDwTQCmO-1NisCH06A -c /opt/kafka/config/kraft/server.properties
            fi
            
            # 6. 启动Kafka服务器
            exec /opt/kafka/bin/kafka-server-start.sh /opt/kafka/config/kraft/server.properties
        env:
        # 1. KRaft 模式配置
        - name: KAFKA_PROCESS_ROLES
          value: "controller,broker"
        - name: KAFKA_CONTROLLER_QUORUM_VOTERS
          value: "0@kafka-0.kafka-headless.default.svc.cluster.local:9093,1@kafka-1.kafka-headless.default.svc.cluster.local:9093,2@kafka-2.kafka-headless.default.svc.cluster.local:9093"
        - name: KAFKA_CONTROLLER_LISTENER_NAMES
          value: "CONTROLLER"
        # 2. 集群 ID（KRaft 模式必须）
        - name: KAFKA_CLUSTER_ID
          value: "4L62ZDwTQCmO-1NisCH06A"
        - name: LOG_DIRS
          value: /var/lib/kafka/logs
        # 3. 动态获取 Pod 名称用于计算 Node ID
        - name: POD_NAME
          valueFrom:
            fieldRef:
              fieldPath: metadata.name
        ports:
        - containerPort: 9092
          name: internal
        - containerPort: 9094
          name: external
        - containerPort: 9093
          name: controller
        # 7. 自动持久化：Bitnami 镜像会将数据存放在 /bitnami/kafka
        volumeMounts:
        - name: kafka-data
          mountPath: /var/lib/kafka
  # 8. 自动申请存储卷（kind 集群自带默认的 StorageClass，会自动在宿主机创建虚拟硬盘）
  volumeClaimTemplates:
  - metadata:
      name: kafka-data
    spec:
      accessModes: [ "ReadWriteOnce" ]
      resources:
        requests:
          storage: 2Gi